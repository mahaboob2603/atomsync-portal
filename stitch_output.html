<span class="material-symbols-outlined text-primary-container text-2xl">speed</span>
</div>
</div>
<div class="flex gap-2">
<div class="h-1 flex-1 bg-primary-container rounded-full shadow-[0_0_8px_rgba(253,185,19,0.5)]"></div>
<div class="h-1 flex-1 bg-primary-container rounded-full shadow-[0_0_8px_rgba(253,185,19,0.5)]"></div>
<div class="h-1 flex-1 bg-primary-container rounded-full shadow-[0_0_8px_rgba(253,185,19,0.5)]"></div>
<div class="h-1 flex-1 bg-white/20 rounded-full"></div>
</div>

</div>
</div>
